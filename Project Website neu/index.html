<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jakob Knut Barthel</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ---------------------------------------------------
   GLOBAL
--------------------------------------------------- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100vw;
    height: 200vh; /* Scrollbereich */
    background: #FFFFFF;
    overflow-x: hidden;
    font-family: Baloo2, sans-serif;
}

/* ---------------------------------------------------
   VIDEO HINTER DEM LOCH
--------------------------------------------------- */
.video-layer {
    position: fixed;
    top: 40%;
    left: 15%;
    width: 23%;
    height: auto;
    transform: translateY(-50%);
    object-fit: cover;
    z-index: -1;
}


/* ---------------------------------------------------
   ROLLE-HINTERGRUND (dein neues Bild)
--------------------------------------------------- */
.background-roll {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;

    /* HIER liegt dein neues Bild – einfach die ausgetauschte Datei RolleT.png */
    background-image: url("/img/index/RolleT.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    z-index: 5;
    pointer-events: none;
}

/* ---------------------------------------------------
   BUCH-ANIMATION
--------------------------------------------------- */
.book-animation {
    position: absolute;
    right: 5vw;
    top: 120vh;
    width: 25vw;
    max-width: 350px;
    opacity: 0;
    transform: translateY(50px);
    transition: opacity 1.5s ease, transform 1.5s ease;
    z-index: 10;
}

.book-animation.visible {
    opacity: 1;
    transform: translateY(0);
}

/* ---------------------------------------------------
   BUTTON-LEISTE UNTEN
--------------------------------------------------- */
.button-bar {
    position: fixed;
    bottom: 2vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2rem; /* Abstand zwischen Buttons */
    width: 90%;
    z-index: 20;
}

.button-bar a {
    flex: 1 1 160px; /* Basisgröße */
    max-width: 200px; /* Obergrenze */
}

.button-bar img {
    width: 100%;
    height: auto;
}

.button-bar img:hover {
    transform: scale(1.08);
    filter: drop-shadow(0 0 12px rgba(255,180,80,1));
}

/* ---------------------------------------------------
   TITEL
--------------------------------------------------- */
.page-title {
    position: fixed;
    top: 2vh;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 3vw, 48px);
    color: #4b2e0a;
    text-shadow: 0 0 8px rgba(75,46,10,0.4);
    z-index: 30;
}

/* ---------------------------------------------------
   HAMBURGER-MENÜ
--------------------------------------------------- */
.menu-icon {
    position: fixed;
    top: 2vh;
    right: 3vw;
    font-size: 3rem;
    color: #4b2e0a; /* besser sichtbar */
    cursor: pointer;
    z-index: 20000;
    display: block; /* IMMER sichtbar */
}

.mobile-menu {
    display: none;
    position: fixed;
    top: 10vh;
    right: 3vw;
    background: rgba(255,255,255,0.95);
    border-radius: 10px;
    padding: 1rem 1.5rem;
    z-index: 20000;
}

.mobile-menu a {
    display: block;
    font-family: 'Cinzel', serif;
    color: #4b2e0a;
    margin: 0.5rem 0;
    text-decoration: none;
}

/* Mobile aktivieren */
@media (max-width: 900px) {

    .video-layer {
        width: 40vw;
        left: 30%;
        top: 35%;
    }

    .button-bar {
        bottom: 4vh;
        gap: 1.2rem;
    }

    .page-title {
        font-size: 6vw;
    }
}

@media (max-width: 600px) {

    .video-layer {
        width: 55vw;
        left: 22%;
        top: 30%;
    }

    .button-bar {
        width: 95%;
        gap: 1rem;
    }

    .button-bar a {
        flex: 1 1 45%;
        max-width: none;
    }
}

</style>
</head>

<body>

<!-- HAMBURGER ICON -->
<div class="menu-icon" onclick="toggleMenu()">☰</div>

<!-- MOBILES MENÜ -->
<nav id="menu" class="mobile-menu">
  <a href="/pages/Impressum.html">Impressum</a>
  <a href="/pages/Datenschutz.html">Datenschutz</a>
  <a href="/pages/Urheberrecht.html">Urheberrecht</a>
  <a href="/pages/Nutzungsbedingungen.html">Nutzungsbedingungen</a>
</nav>

<div class="video-container">
    <video class="video-layer" autoplay muted loop>
        <source src="/img/index/TrinnAnimation720.mp4" type="video/mp4">
    </video>
</div>

<div class="background-roll"></div>



<!-- BUTTON-LEISTE -->
<div class="button-bar">
    <a href="/pages/books.html"><img src="/img/index/Books.png" alt="Books"></a>
    <a href="/pages/audiobook.html"><img src="/img/index/Audiobooks.png" alt="Audiobooks"></a>
    <a href="/pages/illustrations.html"><img src="/img/index/ArtGallery.png" alt="Art Gallery"></a>
    <a href="/pages/movies.html"><img src="/img/index/Shortfilms.png" alt="Movies & Shortfilms"></a>
    <a href="/pages/author2.html"><img src="/img/index/About.png" alt="About the Author"></a>
    <a href="/pages/contact.html"><img src="/img/index/Contact.png" alt="Contact"></a>
</div>

<script>


/* HAMBURGER-MENÜ */
function toggleMenu() {
  const menu = document.getElementById('menu');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}
</script>

</body>
</html>
