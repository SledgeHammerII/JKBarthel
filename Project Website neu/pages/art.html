<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schweizer Berge & Schreibblatt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      color: #222;
    }

    /* Oberes Drittel: Schweizer Berge */
    header {
      height: 33vh;
      min-height: 220px;
      background-image:
        linear-gradient(to top, rgba(0,0,0,0.45), rgba(0,0,0,0.1)),
        url("/img/author/author.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 2rem;
      color: #fff;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 600;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    /* Schreibblatt-Bereich */
    main {
      min-height: 150vh;
      background-color: #ffffff;
      background-image: 
        repeating-linear-gradient(
          to bottom,
          #ffffff 0,
          #ffffff 22px,
          #d9e2f2 23px
        );
      padding: 3rem 1rem 4rem;
      display: flex;
      justify-content: center;
    }

    .paper {
      width: 100%;
      max-width: 800px;
      position: relative;
    }

    /* Linker Rand */
    .paper::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 3rem;
      width: 2px;
      background: rgba(255, 0, 0, 0.4);
    }

    .paper-content {
      padding-left: 4.5rem;
      padding-right: 1.5rem;
    }

    h2 {
      margin-bottom: 1rem;
      font-size: 1.4rem;
    }

    p {
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .paper::before {
        left: 2rem;
      }
      .paper-content {
        padding-left: 3.5rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Schweizer Berge</h1>
  </header>

  <main>
    <div class="paper">
      <div class="paper-content">
        <h2>Digitales Schreibblatt</h2>
        <p>Wenn du diesen Text siehst, funktioniert alles korrekt.</p>
        <p>Scroll nach unten, um die Linien zu sehen.</p>
        <p>Du kannst hier beliebig viel Text einfügen.</p>
      </div>
    </div>
  </main>

</body>
</html>
