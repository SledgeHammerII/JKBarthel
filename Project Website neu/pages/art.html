<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schweizer Berge & Schreibblatt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      color: #222;
    }

    /* Oberes Drittel: Schweizer Berge */
    header {
      height: 33vh;
      min-height: 220px;
      background-image:
        linear-gradient(to top, rgba(0,0,0,0.45), rgba(0,0,0,0.1)),
        url("https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?auto=compress&cs=tinysrgb&w=1600");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 2rem;
      color: #fff;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 600;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    /* Schreibblatt-Bereich */
    main {
      min-height: 120vh; /* genug Inhalt zum Scrollen */
      background-color: #ffffff;
      background-image: 
        repeating-linear-gradient(
          to bottom,
          #ffffff 0,
          #ffffff 22px,
          #d9e2f2 23px
        );
      padding: 3rem 1rem 4rem;
      display: flex;
      justify-content: center
