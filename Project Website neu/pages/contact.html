<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Write to the Author</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Nunito', sans-serif;
        background-color: #f7f1e3;
        min-height: 100vh;
    }

    /* Vollbild-Hintergrund */
    .scroll-wrapper {
        width: 100vw;
        height: 100vh;
        position: relative;
        overflow: hidden;
    }

    .scroll-wrapper img.bg {
        width: 100%;
        height: 100%;
        object-fit: fill; /* füllt den Bildschirm */
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
        user-select: none;
        pointer-events: none;
    }

    /* Textcontainer */
    .content {
        position: absolute;
        top: 12vh;          /* Überschrift perfekt auf der Rolle */
        left: 44%;          /* leicht nach links */
        transform: translateX(-50%);
        width: 80%;
        max-width: 700px;
        text-align: center;
        z-index: 2;
    }

    h1 {
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        margin-bottom: 1vh;
    }

    .intro-text {
        font-size: clamp(1rem, 1.8vw, 1.2rem);
        font-style: italic;
        color: #3a2f22;
        margin-bottom: 3vh;
    }

    label {
        display: block;
        text-align: left;
        margin: 2vh auto 0 auto;
        max-width: 450px;
        font-weight: bold;
    }

    input, textarea {
        width: 100%;
        max-width: 450px;
        margin: 0 auto;
        display: block;
        padding: 10px;
        border: none;
        border-bottom: 1px solid rgba(60,40,20,0.3);
        background: transparent;
        font-size: 1rem;
        outline: none;
    }

    textarea {
        height: 160px;
        resize: vertical;
    }

    .helper-text {
		position: absolute;   /* fixiert den Text */
		bottom: 3vh;          /* Höhe über dem unteren Rand der Rolle */
		left: 50%;            /* zentriert */
		transform: translateX(-50%);
		font-size: clamp(0.8rem, 1.2vw, 1rem);
		font-style: italic;
		user-select: none;
		color: #3a2f22;
}


    /* SEND-BUTTON – deutlich höher und weiter links */
    .send-button {
        position: absolute;
        top: 52vh;         /* höher gesetzt */
        left: 0%;         /* weiter links unter Your Message */
        transform: translateX(-50%);
        background: transparent;
        border: none;
        cursor: pointer;
        user-select: none;
        z-index: 3;
    }

    .send-button img {
        width: clamp(120px, 14vw, 160px);
        height: auto;
        display: block;
    }

    @media (max-width: 600px) {
        .content {
            top: 10vh;
            left: 50%;
        }

        .send-button {
            top: 70vh;
            left: 50%;
        }

        .send-button img {
            width: 130px;
        }
    }
</style>
</head>

<body>

<div class="scroll-wrapper">
    <img class="bg" src="../img/contact/PapyrusrolleHolz2.png" alt="Papyrus">

    <div class="content">
        <h1>Write to the Author</h1>

        <p class="intro-text">
            Have a question, a favorite character, or a magical idea?<br>
            Send a message and step into the adventure!
        </p>

        <form action="https://formspree.io/f/DEINE-ID-HIER" method="POST">
            <label>Name</label>
            <input type="text" name="name" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Your Message</label>
           <textarea name="message" required maxlength="250"></textarea>

            <p class="helper-text">
                Parents can also contact me for school readings, collaborations, and events.
            </p>

            <button class="send-button">
                <img src="../img/contact/Sendbutton.png" alt="Send">
            </button>
        </form>
    </div>
</div>

</body>
</html>
