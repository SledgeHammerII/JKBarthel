<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Write to the Author</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
    /* Grundlayout */
    body {
        margin: 0;
        padding: 0;
        font-family: 'Nunito', sans-serif;
        background-color: #f7f1e3;
        min-height: 100vh;
    }

    /* Vollbild-Hintergrund */
    .scroll-wrapper {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;      /* vertikal zentriert */
        justify-content: center;  /* horizontal zentriert */
        overflow: hidden;
    }

    .scroll-wrapper img.bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;        /* füllt den gesamten Bildschirm proportional */
        object-position: center;  /* bleibt zentriert */
        z-index: 1;
        user-select: none;
        pointer-events: none;
    }

    /* EIN Block für alles */
    .content-block {
    position: relative;
    z-index: 2;

    /* Blockbreite proportional */
    width: min(60vw, 600px);

    /* Innenabstand kompakter */
    padding: clamp(1.2rem, 2.5vh, 2rem);

    text-align: center;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;

    /* Abstände deutlich kompakter */
    gap: clamp(0.8rem, 1.5vh, 1.4rem);

    /* PROPORTIONALE SKALIERUNG – jetzt stärker */
    transform: scale(clamp(0.65, 1.2vw, 1.25));
    transform-origin: center top;
	margin-left: -15vw;   /* verschiebt den Block nach links */
	margin-top: 3vh;
	}


    /* Überschrift */
    .content-block h1 {
        font-size: clamp(1.4rem, 2.4vw, 2.2rem);
		margin: 0;
	}

    /* Intro */
    .intro-text {
        font-size: clamp(0.9rem, 1.4vw, 1.1rem);
        font-style: italic;
        color: #3a2f22;
        margin: 0;
    }

    /* Formular */
    form {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(1rem, 2vh, 1.5rem);
    }

    .form-row {
        display: flex;
        flex-direction: column;
        gap: clamp(0.3rem, 0.8vh, 0.6rem);
        width: 100%;
        max-width: 450px;
    }

    label {
        text-align: left;
        font-weight: bold;
        font-size: clamp(0.8rem, 1.2vw, 0.95rem);
        margin-bottom: 0.2vh;
    }

    input,
    textarea {
        width: 100%;
        padding: 0.4rem;
        border: none;
        border-bottom: 1px solid rgba(60,40,20,0.3);
        background: transparent;
        font-size: clamp(0.85rem, 1.2vw, 1rem);
		padding: 0.4rem;
        outline: none;
        resize: none;
        box-sizing: border-box;
		margin-bottom: -2vh; /* engerer Abstand zwischen Feldern */
    }

    textarea {
        height: clamp(100px, 14vh, 150px);
    }

    /* Hinweistext */
    .helper-text {
        font-size: clamp(0.75rem, 1vw, 0.95rem);
        font-style: italic;
        color: #3a2f22;
        margin-top: -1.5vh; /* hebt den Satz etwas an */
    }

    /* Sendebutton */
    .send-button {
        background: transparent;
        border: none;
        cursor: pointer;
        user-select: none;
    }

    .send-button img {
        width: clamp(130px, 15vw, 170px);
        height: auto;
        display: block;
        margin: 0 auto;
		margin-top: 0vh;   /* Button höher */
    }

    /* Mobile-Anpassung */
    @media (max-width: 600px) {
        .content-block {
            width: 90vw;
            padding: clamp(1.5rem, 3vh, 2.2rem);
        }
    }
</style>
</head>

<body>

<div class="scroll-wrapper">
    <img class="bg" src="../img/contact/PapyrusrolleHolz2.png" alt="Papyrus">

    <div class="content-block">
        <h1>Write to the Author</h1>

        <p class="intro-text">
            Have a question, a favorite character, or a magical idea?<br>
            Send a message and step into the adventure!
        </p>

        <form action="https://formspree.io/f/DEINE-ID-HIER" method="POST">
            <div class="form-row">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-row">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-row">
                <label>Your Message</label>
                <textarea name="message" required maxlength="200"></textarea>
            </div>

            <p class="helper-text">
                Parents can also contact me for school readings, collaborations, and events.
            </p>

            <button class="send-button">
                <img src="../img/contact/Sendbutton.png" alt="Send">
            </button>
        </form>
    </div>
</div>

</body>
</html>
