<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trinn</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #0a0806;
    overflow: hidden;
    font-family: 'Baloo 2', sans-serif;
  }

  /* ============================================
     BÜHNE 1: Intro-Video (2.mp4) - spielt einmal ab,
     volle Fläche. Sobald es endet, wird sanft zur
     Bände-Auswahl (Bühne 2) übergeblendet.
     ============================================ */
  .video-stage {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 10;
    opacity: 1;
    transition: opacity 0.6s ease;
  }

  .video-stage.fading-out {
    opacity: 0;
    pointer-events: none;
  }

  .video-stage video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ============================================
     BÜHNE 2: TrinnInnen.png mit 5 unsichtbaren
     Band-Buttons. Gleicher Hover-Mechanismus wie in
     books.html: Banner+Bild leuchtet golden auf,
     Bandname erscheint groß mit starkem Glow.
     ============================================ */
  .scene-baende {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .scene-baende img.bg-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .band-btn {
    position: absolute;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    overflow: visible;
    -webkit-tap-highlight-color: transparent;
  }

  /* Weicher, unregelmäßiger Glow statt einer harten Rechteck-Kante -
     mehrere überlappende, weich verlaufende Radial-Gradients sorgen
     dafür, dass man keine "Box" sieht, sondern nur ein diffuses
     Aufleuchten über Banner+Bild. */
  .band-btn::before {
    content: "";
    position: absolute;
    top: -20%;
    left: -20%;
    right: -20%;
    bottom: -20%;
    background:
      radial-gradient(circle at 50% 22%, rgba(255, 221, 140, 0.55) 0%, rgba(255, 221, 140, 0) 65%),
      radial-gradient(circle at 50% 70%, rgba(255, 221, 140, 0.5) 0%, rgba(255, 221, 140, 0) 75%);
    opacity: 0;
    transition: opacity 0.35s ease;
    mix-blend-mode: screen;
    pointer-events: none;
    filter: blur(6px);
  }

  .band-btn:hover::before {
    opacity: 1;
  }

  .band-btn:hover {
    filter: brightness(1.22) saturate(1.12);
  }

  /* ============================================
     BÜHNE 3: Band-Detailseite als aufgeschlagenes Buch
     ============================================
     Aufbau in zwei Schichten:
     1) Tisch.png als Hintergrund über den ganzen Bildschirm
        (darf an den Rändern beschnitten werden, cover ist ok,
        da dort kein Inhalt/Text liegt).
     2) .book-frame: ein Container mit FESTEM Seitenverhältnis
        (passend zu BuchLeer.png), der mittig sitzt und bei jeder
        Bildschirmgröße proportional mitskaliert, NIE verzerrt wird.
     Zeigt genau ZWEI Schritte an: zuerst das Cover des Bandes,
     danach (per Weiterblättern) ein Inhaltsverzeichnis mit Links
     zu Kurzbeschreibung / Leseprobe / Charaktere / Hinter den
     Kulissen / Jetzt kaufen. Diese Unterseiten leben als eigene,
     wiederverwendbare Vorlagen (kurzbeschreibung.html usw.), die
     per ?band=N wissen, welcher Band gerade gemeint ist - Inhalte
     kommen zentral aus trinn-data.js.
     ============================================ */
  .scene-detail {
    position: fixed;
    inset: 0;
    background: #2a1c10 url('../img/trinn/Tisch.png') center center / cover no-repeat;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.5s ease;
    z-index: 25;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene-detail.visible {
    opacity: 1;
    visibility: visible;
  }

  /* Fester Seitenverhältnis-Container für das Buch selbst.
     1672x941 sind die echten Pixel-Maße von BuchLeer.png. */
  .book-frame.book-frame--double {
    position: relative;
    aspect-ratio: 1672 / 941;
    width: min(calc(100vw - 6px), calc((100vh - 6px) * 1672 / 941));
    height: min(calc(100vh - 6px), calc((100vw - 6px) * 941 / 1672));
  }

  .book-frame__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
  }

  /* Sichtbare Bildfläche innerhalb von .book-frame - wird per JS
     exakt auf die tatsächlich sichtbare Buchgrafik positioniert
     (siehe updateVisualBoundsFor), damit Inhalt immer exakt auf
     der gemalten Buchseite sitzt, unabhängig vom Bildschirmformat. */
  .book-visual-bounds {
    position: absolute;
  }

  /* Sichere Content-Zone auf der Doppelseite (ausgemessen anhand
     der Papierflächen in BuchLeer.png). Zeigt IMMER beide Hälften
     gleichzeitig: links das Cover, rechts das Inhaltsverzeichnis -
     kein Blättern nötig, da beide Seiten nebeneinander Platz haben
     (anders als im Einzelseiten-Modus, siehe .single-page-area). */
  .book-area {
    position: absolute;
    top: 15.9%;
    left: 16.4%;
    right: 16.5%;
    bottom: 15.1%;
    display: flex;
  }

  .book-half {
    position: relative;
    width: 50%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Padding-Werte bewusst asymmetrisch: mehr Abstand zur Buchmitte
     (Falz) als zur Außenkante, damit Cover/Text zentriert auf der
     jeweiligen Buchseite stehen statt Richtung Mitte zu rutschen.
     Oben weniger Abstand als unten, damit das Cover etwas höher sitzt. */
  .book-half.left {
    padding: 0.5% 5% 3% 0.5%;
  }

  .book-half.right {
    padding: 3% 1% 3% 9%;
  }

  /* ============================================
     EINZELSEITEN-MODUS (schmale Bildschirme)
     ============================================
     Unter SINGLE_PAGE_BREAKPOINT_PX (siehe JS) wird statt der
     Doppelseite nur EINE randfüllende Seite gezeigt (SeiteLeer.png).
  */
  .book-frame--double {
    display: flex;
  }
  .book-frame--single {
    display: none;
  }
  body.single-page-mode .book-frame--double {
    display: none;
  }
  body.single-page-mode .book-frame--single {
    display: flex;
  }

  .book-frame--single {
    position: relative;
    aspect-ratio: 703 / 714; /* echte Maße von SeiteLeer.png */
    width: min(99vw, calc(98vh * 703 / 714));
    height: min(98vh, calc(99vw * 714 / 703));
  }

  .book-frame--single .book-frame__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
  }

  /* Sichere Content-Zone auf der Einzelseite. */
  .single-page-area {
    position: absolute;
    top: 11.5%;
    left: 13.4%;
    right: 13.5%;
    bottom: 10.1%;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 2400px;
    transform-origin: center center;
    transition: transform 0.7s cubic-bezier(0.45, 0, 0.2, 1);
    backface-visibility: hidden;
  }

  /* Beim Weiterblättern klappt die aktuelle Ansicht weg, die neue
     erscheint danach in normaler Position (gilt für .book-area
     UND .single-page-area, siehe JS). */
  .flip-out-right {
    transform: rotateY(-150deg);
  }

  .flip-out-left {
    transform: rotateY(150deg);
  }

  /* ---- Cover (Schritt 0) ----
     Zusätzlich zum asymmetrischen Padding von .book-half.left noch
     etwas vergrößert und weiter nach oben/außen verschoben, bleibt
     aber innerhalb der Buchseite mittig. */
  .cover-wrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(1.12) translate(-6%, -3%);
  }

  .cover-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
  }

  .cover-placeholder {
    width: 72%;
    aspect-ratio: 3 / 4;
    border: 3px dashed rgba(58, 38, 20, 0.4);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #4a2e1a;
    padding: 20px;
    background: rgba(255, 255, 255, 0.18);
  }

  .cover-placeholder .ph-title {
    font-weight: 800;
    font-size: 1.3em;
  }

  .cover-placeholder .ph-sub {
    font-size: 0.9em;
    opacity: 0.7;
    margin-top: 0.4em;
  }

  /* ---- Inhaltsverzeichnis (Schritt 1) ---- */
  .toc-wrap {
    width: 100%;
    max-width: 480px;
    text-align: center;
    color: #4a2e1a;
  }

  .toc-title {
    font-size: clamp(1.5em, 4vw, 2.3em);
    font-weight: 800;
    color: #4a2e1a;
  }

  .toc-subtitle {
    font-size: clamp(0.95em, 2vw, 1.25em);
    opacity: 0.75;
    margin-bottom: 0.9em;
  }

  .toc-menu {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Kein sichtbarer Kasten mehr - nur die Schrift selbst zeigt beim
     Hover an, dass man dort klicken kann (Glow + leichtes Aufhellen),
     passend zum Hover-Stil der Band-Buttons auf der Auswahlseite. */
  .toc-item {
    display: block;
    background: transparent;
    border: none;
    padding: 4px;
    color: #4a2e1a;
    font-weight: 700;
    font-size: clamp(0.9em, 1.7vw, 1.1em);
    text-decoration: none;
    transition: color 0.25s ease, text-shadow 0.25s ease, transform 0.2s ease;
  }

  .toc-item:hover {
    color: #96500f;
    text-shadow:
      0 0 10px rgba(255, 180, 80, 0.9),
      0 0 20px rgba(255, 150, 60, 0.55);
    transform: scale(1.05);
  }

  .toc-item--buy:hover {
    color: #2d6a2d;
    text-shadow:
      0 0 10px rgba(140, 255, 140, 0.8),
      0 0 20px rgba(90, 220, 90, 0.5);
  }

  /* ---- Blättern-Buttons unten mittig ----
     Nur im Einzelseiten-Modus nötig: im Doppelseiten-Modus sind
     Cover UND Inhaltsverzeichnis gleichzeitig sichtbar (links/rechts),
     da gibt es nichts umzublättern. */
  .flip-controls {
    position: absolute;
    bottom: 3%;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 18px;
    z-index: 30;
  }

  body.single-page-mode .flip-controls {
    display: flex;
  }

  .flip-btn {
    background: rgba(75, 46, 10, 0.78);
    color: #f5d1a0;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    border: 1px solid rgba(245, 209, 160, 0.4);
    border-radius: 999px;
    padding: 9px 20px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.2s, transform 0.2s, opacity 0.2s;
  }

  .flip-btn:hover {
    background: rgba(95, 60, 16, 0.92);
    transform: scale(1.05);
  }

  .flip-btn:disabled {
    opacity: 0.35;
    cursor: default;
    transform: none;
  }

  /* Gemeinsamer Stapel-Container für BEIDE Zurück-Buttons. Normalerweise
     ist immer nur einer der beiden sichtbar (siehe JS) - dieser
     Container sorgt aber zusätzlich dafür, dass falls durch einen
     Zustands-Bug (z.B. Browser-Zurück/Vorwärts aus dem bfcache) doch
     mal beide gleichzeitig sichtbar wären, sie UNTEREINANDER statt
     deckungsgleich übereinander liegen - beide bleiben so lesbar. */
  .back-link-stack {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .detail-back-btn {
    background: rgba(75, 46, 10, 0.78);
    color: #f5d1a0;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    border: 1px solid rgba(245, 209, 160, 0.4);
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.2s, transform 0.2s;
  }

  .detail-back-btn:hover {
    background: rgba(95, 60, 16, 0.92);
    transform: scale(1.04);
  }

  .global-back-link {
    background: rgba(75, 46, 10, 0.78);
    color: #f5d1a0;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgba(245, 209, 160, 0.4);
    backdrop-filter: blur(4px);
    transition: background 0.2s, transform 0.2s;
  }

  .global-back-link:hover {
    background: rgba(95, 60, 16, 0.92);
    transform: scale(1.04);
  }
</style>
</head>
<body>

  <!-- ===== BÜHNE 1: Intro-Video 2.mp4 (einmalig) ===== -->
  <div class="video-stage" id="videoStage">
    <video
      id="introVideo"
      src="../img/books/2.mp4"
      playsinline
      muted
      autoplay
      preload="auto"
    ></video>
  </div>

  <!-- ===== BÜHNE 2: Bände-Auswahl auf TrinnInnen.png ===== -->
  <div class="scene-baende" id="sceneBaende">
    <img class="bg-img" src="../img/trinn/TrinnInnen.png" alt="Trinn - Bände-Auswahl">

    <!--
      Koordinaten in % bezogen auf das Bild (object-fit: cover).
      Kein sichtbarer Button, kein Text-Label - der Bandname steht
      ja schon im Banner selbst. Der Button deckt Banner+Bild ab
      und sorgt rein für das weiche Aufleuchten beim Hover.
    -->
    <button class="band-btn" data-band="1" style="left:24.0%; top:18.1%; width:18.2%; height:26.9%;"></button>
    <button class="band-btn" data-band="2" style="left:24.0%; top:49.5%; width:18.2%; height:26.9%;"></button>
    <button class="band-btn" data-band="3" style="left:54.2%; top:18.1%; width:24.0%; height:18.1%;"></button>
    <button class="band-btn" data-band="4" style="left:54.2%; top:39.8%; width:24.0%; height:18.1%;"></button>
    <button class="band-btn" data-band="5" style="left:54.2%; top:61.1%; width:24.0%; height:18.1%;"></button>
  </div>

  <!-- ===== BÜHNE 3: Band-Detailseite als aufgeschlagenes Buch =====
       Doppelseiten-Modus: Cover UND Inhaltsverzeichnis gleichzeitig
       (links/rechts) - kein Blättern nötig.
       Einzelseiten-Modus: Schritt 0 = Cover, Schritt 1 = Inhaltsverzeichnis,
       per Blättern-Buttons wechselbar. -->
  <div class="scene-detail" id="sceneDetail">
    <!-- Doppelseiten-Modus (breite Bildschirme) -->
    <div class="book-frame book-frame--double" id="bookFrame">
      <img class="book-frame__img" id="bookFrameImg" src="../img/trinn/BuchLeer.png" alt="">
      <div class="book-visual-bounds" id="bookVisualBounds">
        <div class="book-area" id="bookArea">
          <div class="book-half left" id="bookHalfLeft"></div>
          <div class="book-half right" id="bookHalfRight"></div>
        </div>
      </div>
    </div>

    <!-- Einzelseiten-Modus (schmale Bildschirme) -->
    <div class="book-frame book-frame--single" id="bookFrameSingle">
      <img class="book-frame__img" id="bookFrameSingleImg" src="../img/trinn/SeiteLeer.png" alt="">
      <div class="book-visual-bounds" id="bookVisualBoundsSingle">
        <div class="single-page-area" id="bookAreaSingle"></div>
      </div>
    </div>

    <div class="flip-controls">
      <button class="flip-btn" id="flipPrevBtn">← Zurückblättern</button>
      <button class="flip-btn" id="flipNextBtn">Weiterblättern →</button>
    </div>
  </div>

  <div class="back-link-stack">
    <button class="detail-back-btn" id="detailBackBtn" style="display:none;">← Zur Bände-Auswahl</button>
    <a class="global-back-link" href="books.html" id="topLevelBackLink" style="display:none;">← Zurück zu Books</a>
  </div>

  <script src="trinn-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const videoStage = document.getElementById('videoStage');
      const introVideo = document.getElementById('introVideo');
      const sceneBaende = document.getElementById('sceneBaende');
      const sceneDetail = document.getElementById('sceneDetail');
      const detailBackBtn = document.getElementById('detailBackBtn');
      const topLevelBackLink = document.getElementById('topLevelBackLink');

      // ---- Bühne 1: Video abspielen, danach zur Bände-Auswahl ----
      function startVideo(video) {
        video.muted = true;
        video.playsInline = true;
        const tryPlay = () => {
          const p = video.play();
          if (p !== undefined) {
            p.catch(() => {
              // Falls Autoplay vom Browser blockiert wird: beim ersten
              // Klick irgendwo auf der Seite nachholen.
              document.addEventListener('click', () => video.play(), { once: true });
            });
          }
        };
        if (video.readyState >= 3) {
          tryPlay();
        } else {
          video.addEventListener('canplay', tryPlay, { once: true });
          video.load();
        }
      }

      function goToBaendeAuswahl() {
        videoStage.classList.add('fading-out');
        detailBackBtn.style.display = 'none';
        topLevelBackLink.style.display = 'block';
        setTimeout(() => {
          videoStage.style.display = 'none';
        }, 700);
      }

      // Video-Ende bzw. Sicherheitsnetz (siehe unten, nur relevant wenn
      // wirklich das Intro-Video gezeigt wird - bei einem Deep-Link
      // direkt in einen Band hinein wird das Video gar nicht erst
      // gestartet, siehe startTrinnPage() weiter unten.
      function armVideoWatchdog() {
        // Sobald das Video zu Ende ist: weiter zur Bände-Auswahl
        introVideo.addEventListener('ended', goToBaendeAuswahl);

        // Sicherheitsnetz: falls das Video aus irgendeinem Grund nicht
        // abspielen kann (z.B. Datei fehlt), nach 6 Sekunden trotzdem
        // weitergehen, damit niemand auf einem schwarzen Bildschirm hängt.
        introVideo.addEventListener('error', goToBaendeAuswahl);
        setTimeout(() => {
          if (!videoStage.classList.contains('fading-out')) {
            goToBaendeAuswahl();
          }
        }, 6000);
      }

      // ---- Bühne 2 -> 3: Klick auf einen Band öffnet das Buch (Cover) ----
      const bookHalfLeft   = document.getElementById('bookHalfLeft');
      const bookHalfRight  = document.getElementById('bookHalfRight');
      const bookAreaSingle = document.getElementById('bookAreaSingle');
      const flipPrevBtn    = document.getElementById('flipPrevBtn');
      const flipNextBtn    = document.getElementById('flipNextBtn');

      const bookFrame         = document.getElementById('bookFrame');
      const bookFrameImg      = document.getElementById('bookFrameImg');
      const bookVisualBounds  = document.getElementById('bookVisualBounds');

      const bookFrameSingle        = document.getElementById('bookFrameSingle');
      const bookFrameSingleImg     = document.getElementById('bookFrameSingleImg');
      const bookVisualBoundsSingle = document.getElementById('bookVisualBoundsSingle');

      // Ab welcher Bildschirmbreite wird auf den Einzelseiten-Modus
      // umgeschaltet?
      const SINGLE_PAGE_BREAKPOINT_PX = 700;

      function isSinglePageMode() {
        return window.innerWidth < SINGLE_PAGE_BREAKPOINT_PX;
      }

      function applyPageModeClass() {
        document.body.classList.toggle('single-page-mode', isSinglePageMode());
      }
      applyPageModeClass();

      // ============================================================
      // Berechnet, wo ein Buch-Bild (object-fit: contain) innerhalb
      // seines Frame-Containers TATSÄCHLICH sichtbar ist, und
      // positioniert das zugehörige .book-visual-bounds-Element
      // exakt auf diese sichtbare Bildfläche.
      // ============================================================
      function updateVisualBoundsFor(frameEl, imgEl, boundsEl) {
        const frameRect = frameEl.getBoundingClientRect();
        const naturalW = imgEl.naturalWidth || frameRect.width;
        const naturalH = imgEl.naturalHeight || frameRect.height;
        const imgRatio = naturalW / naturalH;
        const frameRatio = frameRect.width / frameRect.height;

        let visibleWidth, visibleHeight, offsetX, offsetY;

        if (frameRatio > imgRatio) {
          visibleHeight = frameRect.height;
          visibleWidth = visibleHeight * imgRatio;
          offsetY = 0;
          offsetX = (frameRect.width - visibleWidth) / 2;
        } else {
          visibleWidth = frameRect.width;
          visibleHeight = visibleWidth / imgRatio;
          offsetX = 0;
          offsetY = (frameRect.height - visibleHeight) / 2;
        }

        boundsEl.style.left = offsetX + 'px';
        boundsEl.style.top = offsetY + 'px';
        boundsEl.style.width = visibleWidth + 'px';
        boundsEl.style.height = visibleHeight + 'px';
      }

      function updateBookVisualBounds() {
        updateVisualBoundsFor(bookFrame, bookFrameImg, bookVisualBounds);
        updateVisualBoundsFor(bookFrameSingle, bookFrameSingleImg, bookVisualBoundsSingle);
      }

      if (bookFrameImg.complete) updateVisualBoundsFor(bookFrame, bookFrameImg, bookVisualBounds);
      if (bookFrameSingleImg.complete) updateVisualBoundsFor(bookFrameSingle, bookFrameSingleImg, bookVisualBoundsSingle);
      bookFrameImg.addEventListener('load', () => updateVisualBoundsFor(bookFrame, bookFrameImg, bookVisualBounds));
      bookFrameSingleImg.addEventListener('load', () => updateVisualBoundsFor(bookFrameSingle, bookFrameSingleImg, bookVisualBoundsSingle));

      // ============================================================
      // Cover- und Inhaltsverzeichnis-Anzeige (2 feste Schritte,
      // kein Fließtext/Pagination mehr nötig - lange Texte leben in
      // eigenen Vorlagen-Seiten, siehe trinn-data.js).
      // ============================================================
      let currentBand = 1;
      let currentStep = 0; // 0 = Cover, 1 = Inhaltsverzeichnis

      // Bild fehlt (TrinnBd1.png ... TrinnBd5.png noch nicht alle
      // vorhanden) -> Platzhalter mit Bandname statt kaputtem Bild.
      window.handleCoverImgError = function(imgEl, band) {
        const data = TRINN_BAND_DATA[band];
        const wrap = imgEl.closest('.cover-wrap');
        if (wrap && data) {
          wrap.innerHTML =
            '<div class="cover-placeholder">' +
              '<div class="ph-title">' + data.title + '</div>' +
              '<div class="ph-sub">' + data.subtitle + '</div>' +
            '</div>';
        }
      };

      function renderCoverHtml(band) {
        const data = TRINN_BAND_DATA[band];
        return '<div class="cover-wrap">' +
          '<img class="cover-img" src="' + data.cover + '" alt="' + data.title + '" ' +
          'onerror="window.handleCoverImgError(this, ' + band + ')">' +
          '</div>';
      }

      function renderTocHtml(band) {
        const data = TRINN_BAND_DATA[band];
        return '<div class="toc-wrap">' +
          '<div class="toc-title">' + data.title + '</div>' +
          '<div class="toc-subtitle">' + data.subtitle + '</div>' +
          '<div class="toc-menu">' +
            '<a class="toc-item" href="kurzbeschreibung.html?band=' + band + '">Kurzbeschreibung</a>' +
            '<a class="toc-item" href="leseprobe.html?band=' + band + '">Leseprobe</a>' +
            '<a class="toc-item" href="charaktere.html?band=' + band + '">Charaktere</a>' +
            '<a class="toc-item" href="hinter-den-kulissen.html?band=' + band + '">Hinter den Kulissen</a>' +
            '<a class="toc-item toc-item--buy" href="' + data.kaufenUrl + '" target="_blank" rel="noopener">Jetzt kaufen</a>' +
          '</div>' +
        '</div>';
      }

      // Doppelseiten-Modus: Cover links + Inhaltsverzeichnis rechts,
      // IMMER beide gleichzeitig (kein Blättern nötig/möglich hier).
      function renderDoubleSpread(band) {
        bookHalfLeft.innerHTML = renderCoverHtml(band);
        bookHalfRight.innerHTML = renderTocHtml(band);
      }

      // Einzelseiten-Modus: nur EINE Seite auf einmal, per Blättern-
      // Buttons zwischen Cover (Schritt 0) und Inhaltsverzeichnis
      // (Schritt 1) wechselbar.
      function renderSingleStep(band, step) {
        bookAreaSingle.innerHTML = step === 0 ? renderCoverHtml(band) : renderTocHtml(band);
        updateFlipButtons();
      }

      function updateFlipButtons() {
        flipPrevBtn.disabled = currentStep <= 0;
        flipNextBtn.disabled = currentStep >= 1;
      }

      function flipToStep(direction) {
        const nextStep = direction === 'next' ? currentStep + 1 : currentStep - 1;
        if (nextStep < 0 || nextStep > 1) return;

        const outClass = direction === 'next' ? 'flip-out-right' : 'flip-out-left';
        bookAreaSingle.classList.add(outClass);

        setTimeout(() => {
          currentStep = nextStep;
          renderSingleStep(currentBand, currentStep);
          bookAreaSingle.classList.remove('flip-out-right', 'flip-out-left');
        }, 700); // muss zur CSS transition-duration passen
      }

      flipNextBtn.addEventListener('click', () => flipToStep('next'));
      flipPrevBtn.addEventListener('click', () => flipToStep('prev'));

      function openBand(bandNumber, startStep) {
        const band = parseInt(bandNumber, 10);
        if (!TRINN_BAND_DATA[band]) return;
        currentBand = band;
        currentStep = startStep || 0;
        renderDoubleSpread(currentBand);
        renderSingleStep(currentBand, currentStep);
      }

      document.querySelectorAll('.band-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const bandNumber = btn.getAttribute('data-band');
          openBand(bandNumber, 0);
          sceneDetail.classList.add('visible');
          topLevelBackLink.style.display = 'none';
          detailBackBtn.style.display = 'block';
        });
      });

      // ---- Bühne 3 -> 2: Zurück von der Detailseite ----
      detailBackBtn.addEventListener('click', () => {
        sceneDetail.classList.remove('visible');
        detailBackBtn.style.display = 'none';
        topLevelBackLink.style.display = 'block';
      });

      // Bei Fenster-Größenänderung nur Modus + Bildflächen neu
      // berechnen (kein Pagination-Neuaufbau mehr nötig).
      window.addEventListener('resize', () => {
        applyPageModeClass();
        updateBookVisualBounds();
      });

      // ============================================================
      // Deep-Link-Unterstützung: von den Vorlagen-Seiten (Kurzbe-
      // schreibung, Leseprobe, ...) führt der Rücksprung-Link auf
      // trinn.html?band=N&scene=toc, damit man direkt wieder im
      // Inhaltsverzeichnis des richtigen Bandes landet, statt beim
      // Intro-Video neu zu starten.
      // ============================================================
      const urlParams = new URLSearchParams(window.location.search);
      const deepLinkBand = urlParams.get('band');
      const deepLinkScene = urlParams.get('scene');

      if (deepLinkBand && TRINN_BAND_DATA[deepLinkBand]) {
        videoStage.style.display = 'none';
        topLevelBackLink.style.display = 'none';
        detailBackBtn.style.display = 'block';
        sceneDetail.classList.add('visible');
        openBand(deepLinkBand, deepLinkScene === 'toc' ? 1 : 0);
      } else {
        armVideoWatchdog();
        startVideo(introVideo);
      }
    });
  </script>

</body>
</html>
