<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charaktere – Trinn</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="book-reader.css">
</head>
<body>

  <div id="bookReaderMount"></div>

  <script src="trinn-data.js"></script>
  <script src="book-reader.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const band = parseInt(params.get('band'), 10) || 1;
    const data = TRINN_BAND_DATA[band] || TRINN_BAND_DATA[1];
    document.title = `Charaktere – ${data.title}`;

    const charBlocks = data.charaktere.length > 0
      ? data.charaktere.map((c) => ({
          type: 'character',
          media: c.media,
          mediaType: c.mediaType,
          flip: c.flip,
          heading: c.heading,
          text: c.text
        }))
      : [{ type: 'paragraph', text: 'Für diesen Band sind noch keine Charaktere hinterlegt.' }];

    const flow = [
      { type: 'title', heading: 'Charaktere', subheading: `${data.title} – ${data.subtitle}` },
      ...charBlocks
    ];

    initBookReader({
      flow: flow,
      backHref: `trinn.html?band=${band}&scene=toc`
    });
  </script>
</body>
</html>
