<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Über den Autor</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* --- Grundlayout --- */
body {
    margin: 0;
    background: #bfa27a;
    color: #fff;
    font-family: "Baloo 2", sans-serif;
    text-align: center;
    padding: 40px 20px;
}

/* --- Hintergrundbild oben (33% Höhe) --- */
.author-header {
    width: 100%;
    height: 33vh;
    background-image: url("../img/author/author.png");

    /* Querformat erzwingen */
    background-size: 100vw auto;

    background-position: center;
    background-repeat: no-repeat;
}

/* --- Portrait + Rahmen --- */
.author-container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.author-image-wrapper {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background-image: url('/img/rahmen1.png');
    background-size: cover;
    background-position: center;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
}

.author-image {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
}

.text-wrapper {
    max-width: 700px;
    margin: 0 auto;
}

a {
    color: orange;
    font-size: 1.2rem;
}
</style>
</head>

<body>

<!-- HIER ist der Header mit dem Hintergrundbild -->
<div class="author-header"></div>

<div class="author-container">
    <div class="author-image-wrapper">
        <img src="/img/knut.png" alt="Autor" class="author-image">
    </div>

    <h1>Über den Autor</h1>

    <div class="text-wrapper">
        <p>Hi! Mein Name ist Jakob Knut Barthel oder kurz gesagt J.K.Barthel.</p>
        <p>Und nein, ich bin nicht verwandt mit J.K. Rowling xD.</p>

        <p>Mit 10 Jahren habe ich das Schreiben für mich entdeckt …</p>

        <a href="../index.html">← Zurück zur Startseite</a>
    </div>
</div>

</body>
</html>
